# Build the docs and publish to GitHub Pages.
name: "Documentation"

on: 
- push
# - pull_request  # this needs enableing for external PRs

# cancel builds in progress if a new push has been made to the same ref
# see https://stackoverflow.com/a/70972844/1320237
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  gh-pages:
    name: "Publish Documentation to GitHub Pages"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Production branch. Change to 'main' once the default branch flips.
    if: ${{ github.ref_name == 'master' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ 3.11 }}  # try to avoid renovate update
      - name: Install tox and ghp-import
        run: pip install tox ghp-import
      - name: Build all languages
        run: |
          tox -e docs -- -D language=en docs docs/_build/html/en
          for lang in $(ls docs/locale | grep -v '^en$'); do
            .tox/docs/bin/sphinx-build -W --keep-going -b html -j auto -D language=$lang docs docs/_build/html/$lang
          done
          # Root redirect to /en/ so the bare site URL resolves.
          cat > docs/_build/html/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=en/">
          <link rel="canonical" href="en/">
          EOF
      - name: Deploy to gh-pages
        run: ghp-import -p -f -n docs/_build/html

  link-check:
    name: "Check Links in Documentation"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Production branch. Change to 'main' once the default branch flips.
    if: ${{ github.ref_name == 'master' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ 3.11 }}  # try to avoid renovate update
      - name: Install tox
        run: pip install tox linkchecker
      - name: Check Links
        run: scripts/check-links-in-documentation.sh
        continue-on-error: true
      - uses: actions/upload-artifact@v6
        with:
          name: checked-links.html
          path: linkchecker-out.html
